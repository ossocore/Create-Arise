["General Configs"]
	#Toggle for the mod's custom tooltips
	enableModTooltips = true
	#Toggle the need to crouch to initiate/cancel the mining minigame for forging + weapon polishing
	requireCrouchForForgingGrinding = true

["Anvil Conversion"]
	#Allow shift-right-clicking stone to convert into Stone Smithing Anvil
	enableStoneToAnvil = true
	#Allow shift-right-clicking vanilla anvil to convert into Smithing Anvil
	enableAnvilToSmithing = true
	#Requires blueprint to obtain higher quality items
	enableBlueprintForging = true

["Stone Smithing Anvil"]
	#Number of uses before the Stone Smithing Anvil breaks. Set to 0 to disable.
	# Default: 64
	# Range: > 0
	max_uses = 64
	#Enable Stone Smithing Anvil turns into cobblestone after falling
	enableAnvilToStone = true

["Heated Items"]
	#How many ticks before a heated item cools off in inventory (default: 1200 = 60s)
	# Default: 1200
	# Range: > 1
	heatedItemCooldownTicks = 1200
	#Block entity types that should NOT be checked for item cooling.
	#Use the full registry name, e.g. 'minecraft:furnace', 'minecraft:blast_furnace'.
	#Useful for excluding containers you don't want affected by cooling.
	coolingBlockEntityBlacklist = ["minecraft:furnace", "minecraft:blast_furnace"]

["Arrow Fletching Settings"]
	#Enable or disable all Fletching recipes and related tab
	enableFletchingRecipes = true
	#Enable or disable Dragon Breath's brewing recipe
	enableDragonBreathRecipe = true
	#Enable or disable arrow tipping into potion arrow
	enableTipping = true
	#Toggle for the ability to tip iron, steel, diamond arrows.
	enableUpgradeArrowTipping = true
	#How many arrows can a bottle of potion tip before it's depleted
	# Default: 8
	# Range: > 0
	maxPotionTipping = 8

["Minigame Common Settings"]
	#Toggle for the forging minigame
	enableMinigame = true
	#Toggle for if ingredients' quality define the result's
	ingredientsDefineQuality = true
	#How likely it is for the player to get Masterwork when getting Perfectly Forged. Set to 0 to disable it.
	# Default: 0.05
	# Range: 0.0 ~ 1.0
	masterQualityChance = 0.05
	#Chance that using a Master-quality ingredient results in Master-quality result
	# Default: 0.5
	# Range: 0.0 ~ 1.0
	masterFromIngredientChance = 0.5
	#Maximum distance you can go from your Smithing Anvil before minigame reset
	# Default: 100
	# Range: 0 ~ 1000
	maxAnvilDistance = 100
	#Toggle for if the result item has player's name
	enableAuthorTooltips = true
	#Lowest score required to get perfect quality
	# Default: 0.9
	# Range: 0.0 ~ 1.0
	perfectQualityScore = 0.9
	#Lowest score required to get expert quality
	# Default: 0.6
	# Range: 0.0 ~ 1.0
	expertQualityScore = 0.6
	#Lowest score required to get well quality
	# Default: 0.3
	# Range: 0.0 ~ 1.0
	wellQualityScore = 0.3

