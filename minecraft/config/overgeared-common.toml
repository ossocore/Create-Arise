["Durability & Grinding"]
	#Defines the base durability multiplier of all items that has durability.
	# Default: 1.0
	# Range: 0.0 ~ 10000.0
	durability = 1.0
	#Items or tags that will NOT receive base durability multiplier
	base_durability_blacklist = ["minecraft:flint_and_steel", "overgeared:fired_tool_cast"]
	#Can the grindstone be used for restoring durability or not
	grindingToggle = true
	#Items or tags that cannot be repaired or affected by grinding. Prefix with '#' to use a tag, e.g. '#c:ingots/iron'
	grindingBlacklist = ["minecraft:elytra", "overgeared:wooden_tongs", "overgeared:fired_tool_cast"]
	#How much the item durability reduce per grindstone use
	# Default: 0.05
	# Range: 0.0 ~ 1.0
	durabilityReduce = 0.05
	#How much the item's durability restore per grindstone use
	# Default: 0.1
	# Range: 0.0 ~ 1.0
	damageRestore = 0.1

